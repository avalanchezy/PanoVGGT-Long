img_size: 518
patch_size: 14
embed_dim: 1024

model:
  img_size: ${img_size}
  patch_size: ${patch_size}
  embed_dim: ${embed_dim}
  enable_camera: True
  enable_depth: True
  enable_point: True
  enable_track: False
  train_conf: False
  aggregator:
    depth: 36
    num_heads: 16
    mlp_ratio: 4.0
    patch_embed: "dinov2_vitl14_reg"
    num_register_tokens: 5
    qkv_bias: True
    proj_bias: True
    ffn_bias: True
    qk_norm: True
    rope_freq: 100
    init_values: 0.01
